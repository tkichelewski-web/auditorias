<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#07583B">
<title>Auditoria SSMA · Usina Santa Adélia</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="hazard"></div>

<div class="app-shell">

  <!-- Sidebar (persistente — nunca é re-renderizada pelo router) -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar__brand">
      <img src="icon.svg" alt="" class="sidebar__logo">
      <div>
        <p class="brand__eyebrow">Usina Santa Adélia</p>
        <p class="sidebar__brand-name">Plataforma SSMA</p>
      </div>
    </div>
    <nav class="nav" id="nav">
      <button class="nav__btn" data-nav="dashboard"   onclick="App.goDashboard()"><span class="nav__icon">📊</span> Painel</button>
      <button class="nav__btn" data-nav="form"        onclick="App.goNewAudit()"><span class="nav__icon">📋</span> Nova Auditoria</button>
      <button class="nav__btn" data-nav="agenda"      onclick="App.goAgenda()"><span class="nav__icon">📅</span> Agenda</button>
      <button class="nav__btn" data-nav="acoes"       onclick="App.goAcoes()"><span class="nav__icon">⚠️</span> Planos de Ação</button>
      <button class="nav__btn" data-nav="analise"     onclick="App.goAnalise()"><span class="nav__icon">📈</span> Análise</button>
      <button class="nav__btn" data-nav="cadastros"   onclick="App.goCadastros()"><span class="nav__icon">👥</span> Cadastros</button>
      <button class="nav__btn" data-nav="formularios" onclick="App.goFormularios()"><span class="nav__icon">⚙️</span> Formulários</button>
    </nav>
    <div class="sidebar__footer" id="online-status"></div>
  </aside>

  <!-- Backdrop do drawer mobile -->
  <div class="sidebar-backdrop" onclick="toggleSidebar()"></div>

  <!-- Coluna principal: topbar fixa + conteúdo dinâmico -->
  <div class="main-col">
    <div class="topbar">
      <div class="topbar__inner">
        <button class="sidebar-toggle" onclick="toggleSidebar()" aria-label="Abrir menu">☰</button>
        <h1 class="brand__title" id="page-title">Painel</h1>
        <div class="topbar__spacer"></div>
        <div class="topbar__user">👤 Equipe SSMA</div>
      </div>
    </div>

    <main class="shell" id="app">
      <div class="loading">Carregando…</div>
    </main>
  </div>

</div>

<!-- Dexie (IndexedDB wrapper para armazenamento offline) -->
<script src="https://cdn.jsdelivr.net/npm/dexie@3/dist/dexie.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="supabaseClient.js"></script>
<script src="router.js"></script>
<script src="app.js"></script>

<script>
  // Registra Service Worker para funcionamento offline
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('SW registrado:', reg.scope))
        .catch(err => console.warn('SW falhou:', err));
    });
  }
</script>
</body>
</html>
